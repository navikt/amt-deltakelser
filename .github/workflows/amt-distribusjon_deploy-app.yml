name: amt-distribusjon - Deploy app
on:
  workflow_dispatch: # This workflow can be triggered manually
  push:
    paths:
      - "amt-distribusjon/**"
      - "gradle/libs.versions.toml"
    branches:
      - main

permissions:
  id-token: write

jobs:
  call-deploy:
    uses: ./.github/workflows/reusable/deploy-app.yml
    with:
      module-path: "amt-distribusjon"