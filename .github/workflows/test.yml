name: Run tests for changed modules
on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Find changed modules
        id: changes
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "First push on branch — building everything"
            echo "changed=ALL" >> $GITHUB_OUTPUT
            echo "count=999" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | cut -d/ -f1 | sort -u)
          
          echo "Changed modules: $CHANGED"
          
          COUNT=$(echo "$CHANGED" | wc -w)
          
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Run tests
        run: |
          CHANGED="${{ steps.changes.outputs.changed }}"
          COUNT=${{ steps.changes.outputs.count }}
          
          # Allowed single-module builds
          TARGETS="amt-deltaker amt-deltaker-bff amt-distribusjon"
          
          if [ "$COUNT" -eq 1 ] && echo "$TARGETS" | grep -wq "$CHANGED"; then
            echo "Only $CHANGED changed — building only that module"
            ./gradlew ":$CHANGED:check" --no-daemon
          else
            echo "Multiple modules or shared code changed — building everything"
            ./gradlew check --no-daemon
          fi
