name: Deploy unleash-apitoken

on:
  push:
    paths:
      - "*/.nais/unleash-apitoken-*.yaml"

permissions:
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            amt-deltaker-bff:
              - amt-deltaker-bff/.nais/unleash-apitoken-*.yaml
            amt-deltaker:
              - amt-deltaker/.nais/unleash-apitoken-*.yaml
            amt-tiltaksarrangor-bff:
              - amt-tiltaksarrangor-bff/.nais/unleash-apitoken-*.yaml

      - name: Debug changed packages
        run: |
          echo "Changed packages raw output:"
          echo '${{ steps.filter.outputs.changes }}'

  deploy:
    needs: changes
    if: ${{ needs.changes.outputs.packages != '[]' }}
    strategy:
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    uses: ./.github/workflows/deploy-unleash-apitoken.yml
    with:
      module-path: ${{ matrix.package }}